name: Daily Policy Briefing

on:
  schedule:
    # GitHub schedules use UTC. These two runs straddle Sydney daylight saving:
    # 20:07 UTC = 07:07 Sydney during daylight saving, 21:07 UTC = 07:07 otherwise.
    # Avoiding minute 0 reduces GitHub's top-of-hour schedule delays.
    - cron: '7 20 * * *'
    - cron: '7 21 * * *'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check Sydney run time
        id: sydney_time
        env:
          EVENT_SCHEDULE: ${{ github.event.schedule }}
        run: |
          SHOULD_RUN=$(python - <<'PY'
          from datetime import datetime
          from zoneinfo import ZoneInfo
          import os

          if os.environ.get("GITHUB_EVENT_NAME") == "workflow_dispatch":
              print("true")
          else:
              # Scheduled workflows can start late. Key off the cron expression
              # GitHub fired, not the exact wall-clock hour when the runner starts.
              schedule = os.environ.get("EVENT_SCHEDULE", "")
              offset_hours = datetime.now(ZoneInfo("Australia/Sydney")).utcoffset().total_seconds() / 3600
              valid_schedule = "7 20 * * *" if offset_hours == 11 else "7 21 * * *"
              print("true" if schedule == valid_schedule else "false")
          PY
          )
          echo "should_run=${SHOULD_RUN}" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        if: steps.sydney_time.outputs.should_run == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        if: steps.sydney_time.outputs.should_run == 'true'
        run: pip install -r requirements.txt

      - name: Restore dedupe database
        if: steps.sydney_time.outputs.should_run == 'true'
        uses: actions/cache@v5
        with:
          path: policy_monitor.db
          key: dedupe-db-${{ github.run_id }}
          restore-keys: |
            dedupe-db-

      - name: Validate email configuration
        if: steps.sydney_time.outputs.should_run == 'true'
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          missing=()
          for name in SMTP_HOST SMTP_PORT SMTP_USER SMTP_PASSWORD EMAIL_FROM EMAIL_TO; do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required GitHub secret(s): %s\n' "${missing[*]}" >&2
            exit 1
          fi

      - name: Run daily briefing
        if: steps.sydney_time.outputs.should_run == 'true'
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          MIN_RELEVANCE_SCORE: ${{ vars.MIN_RELEVANCE_SCORE || '25' }}
          MAX_ITEM_AGE_HOURS: ${{ vars.MAX_ITEM_AGE_HOURS || '96' }}
          REQUEST_DELAY: ${{ vars.REQUEST_DELAY || '0.2' }}
          TWITTERAPI_IO_KEY: ${{ secrets.TWITTERAPI_IO_KEY }}
          X_ACCOUNT_HANDLES: ${{ vars.X_ACCOUNT_HANDLES || 'AlboMP,JEChalmers,SenatorWong,MadeleineMHKing,ayrestim,senator_farrell,PatConroy1,murraywatt,CatherineKingMP,AngusTaylorMP,ACCCgovau,dfat,mineralscouncil,Nationalfarmers,au_energy_prod,Johnkehoe23,angelamacd,NickToscano1,JavierBlas,IEA,FatihBirol,Opecsecretariat,Hellenicship,realDonaldTrump,CENTCOM,araghchi,Meti_nippon,JOGMEC_JP,takaichi_sanae,NikkeiAsia,AnwarIbrahim,Lawrencewongst,MTI_sg,MFAsg,channelnewsasia,Bangkokpostnews,MFAThai,Reuters,abcpolitics,financialreview,AJEnglish,FTenergy,WSJenergy,australian,accinews,bcacomau,cosboa,unionsaustralia,sallymcmanus,TWU,TWUMichaelKaine,TWUAus,MichaelS_Guerin,graingrowersltd,cattleaus,seafoodaus,MEUAustralia,AWUnion,_ACAPMA,shippingaus,portsaustralia,RBTUnion,Austrail,MBA_Aust,CFMEU_CG,CFMEU,CFMEUVicTas,AusFoodGrocery,theamwu,ICAus,asfaaust,ARA,ASUnion' }}
          X_PERSON_ACCOUNT_HANDLES: ${{ vars.X_PERSON_ACCOUNT_HANDLES || 'AlboMP,JEChalmers,SenatorWong,MadeleineMHKing,ayrestim,senator_farrell,PatConroy1,murraywatt,CatherineKingMP,AngusTaylorMP,Johnkehoe23,angelamacd,NickToscano1,JavierBlas,FatihBirol,realDonaldTrump,araghchi,takaichi_sanae,AnwarIbrahim,Lawrencewongst' }}
          X_MEDIA_ACCOUNT_HANDLES: ${{ vars.X_MEDIA_ACCOUNT_HANDLES || 'Hellenicship,NikkeiAsia,channelnewsasia,Bangkokpostnews,Reuters,abcpolitics,financialreview,AJEnglish,FTenergy,WSJenergy,australian' }}
          X_LOW_CAP_ACCOUNT_HANDLES: ${{ vars.X_LOW_CAP_ACCOUNT_HANDLES || 'accinews,bcacomau,cosboa,unionsaustralia,sallymcmanus,TWU,TWUMichaelKaine,TWUAus,MichaelS_Guerin,graingrowersltd,cattleaus,seafoodaus,mineralscouncil,MEUAustralia,AWUnion,_ACAPMA,shippingaus,portsaustralia,RBTUnion,Austrail,MBA_Aust,CFMEU_CG,CFMEU,CFMEUVicTas,AusFoodGrocery,theamwu,ICAus,asfaaust,ARA,ASUnion' }}
          X_KEYWORDS: ${{ vars.X_KEYWORDS || 'diesel,petrol,gasoline,gasoil,fuel,refinery,refineries,fuel security,Strait of Hormuz,Hormuz,fuel reserve,petroleum reserve,fuel shortage' }}
          X_MAX_RESULTS: ${{ vars.X_MAX_RESULTS || '25' }}
          X_MAX_MATCHES_PER_ACCOUNT: ${{ vars.X_MAX_MATCHES_PER_ACCOUNT || '500' }}
          X_DEFAULT_SCAN_LIMIT: ${{ vars.X_DEFAULT_SCAN_LIMIT || '25' }}
          X_PERSON_SCAN_LIMIT: ${{ vars.X_PERSON_SCAN_LIMIT || '25' }}
          X_MEDIA_SCAN_LIMIT: ${{ vars.X_MEDIA_SCAN_LIMIT || '125' }}
          X_LOW_CAP_SCAN_LIMIT: ${{ vars.X_LOW_CAP_SCAN_LIMIT || '5' }}
          X_LOOKBACK_HOURS: ${{ vars.X_LOOKBACK_HOURS || '24' }}
          X_INCLUDE_RETWEETS: ${{ vars.X_INCLUDE_RETWEETS || 'false' }}
          X_SECTION_ITEMS: ${{ vars.X_SECTION_ITEMS || '8' }}
          FAIL_ON_EMAIL_ERROR: 'true'
        run: python main.py

      - name: Upload run outputs
        if: always() && steps.sydney_time.outputs.should_run == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: policy-monitor-run-${{ github.run_id }}
          path: |
            output/
            logs/
            policy_monitor.db
          if-no-files-found: ignore
